<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="460" viewBox="0 0 1280 460" role="img" aria-labelledby="title desc">
  <title id="title">Traffic Jam Physics Lab</title>
  <desc id="desc">A glowing closed-loop road with colored cars and congestion waves.</desc>
  <defs>
    <radialGradient id="cyanGlow" cx="22%" cy="20%" r="58%">
      <stop offset="0%" stop-color="#62dcff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#62dcff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="82%" cy="76%" r="54%">
      <stop offset="0%" stop-color="#ff4e64" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ff4e64" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080907"/>
      <stop offset="48%" stop-color="#11140f"/>
      <stop offset="100%" stop-color="#070806"/>
    </linearGradient>
    <linearGradient id="speed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4e64"/>
      <stop offset="28%" stop-color="#ff8d4d"/>
      <stop offset="50%" stop-color="#ffc857"/>
      <stop offset="74%" stop-color="#6bf2a4"/>
      <stop offset="100%" stop-color="#62dcff"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="460" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="460" rx="28" fill="url(#cyanGlow)"/>
  <rect width="1280" height="460" rx="28" fill="url(#redGlow)"/>
  <rect width="1280" height="460" rx="28" fill="url(#grid)" opacity="0.8"/>

  <g filter="url(#cardShadow)">
    <rect x="58" y="54" width="1164" height="352" rx="20" fill="#10110e" fill-opacity="0.66" stroke="#ffffff" stroke-opacity="0.14"/>
  </g>

  <g transform="translate(105 90)">
    <text x="0" y="26" fill="#62dcff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="3">CLOSED-LOOP TRAFFIC FLOW</text>
    <text x="0" y="96" fill="#f5f1e8" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="900">Jam Wave</text>
    <text x="0" y="164" fill="#f5f1e8" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="900">Physics Lab</text>
    <text x="2" y="215" fill="#aaa79d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">Density + reaction time + tiny disturbances</text>
    <text x="2" y="249" fill="#aaa79d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">can create traffic waves from nothing.</text>
  </g>

  <g transform="translate(696 58)">
    <ellipse cx="236" cy="176" rx="230" ry="126" fill="none" stroke="#050604" stroke-width="84" opacity="0.58"/>
    <ellipse cx="236" cy="176" rx="230" ry="126" fill="none" stroke="#262823" stroke-width="70"/>
    <ellipse cx="236" cy="176" rx="230" ry="126" fill="none" stroke="#383b34" stroke-width="52"/>
    <ellipse cx="236" cy="176" rx="230" ry="126" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="3" stroke-dasharray="18 18"/>
    <ellipse cx="236" cy="176" rx="202" ry="111" fill="none" stroke="#62dcff" stroke-opacity="0.24" stroke-width="3"/>
    <ellipse cx="236" cy="176" rx="258" ry="141" fill="none" stroke="#ffc857" stroke-opacity="0.20" stroke-width="3"/>

    <path d="M 33 177 C 67 81 188 40 313 66 C 419 88 478 159 455 229" fill="none" stroke="url(#speed)" stroke-width="24" stroke-linecap="round" filter="url(#softGlow)" opacity="0.88"/>
    <path d="M 430 246 C 374 315 238 337 128 289 C 83 269 50 239 34 202" fill="none" stroke="#ff4e64" stroke-width="18" stroke-linecap="round" filter="url(#softGlow)" opacity="0.74"/>

    <g filter="url(#softGlow)">
      <rect x="146" y="43" width="40" height="16" rx="5" transform="rotate(13 166 51)" fill="#62dcff"/>
      <rect x="238" y="55" width="40" height="16" rx="5" transform="rotate(6 258 63)" fill="#6bf2a4"/>
      <rect x="335" y="89" width="40" height="16" rx="5" transform="rotate(25 355 97)" fill="#ffc857"/>
      <rect x="429" y="172" width="40" height="16" rx="5" transform="rotate(86 449 180)" fill="#ff8d4d"/>
      <rect x="402" y="258" width="40" height="16" rx="5" transform="rotate(145 422 266)" fill="#ff4e64"/>
      <rect x="279" y="310" width="40" height="16" rx="5" transform="rotate(178 299 318)" fill="#ff4e64"/>
      <rect x="145" y="292" width="40" height="16" rx="5" transform="rotate(205 165 300)" fill="#ff8d4d"/>
      <rect x="43" y="207" width="40" height="16" rx="5" transform="rotate(258 63 215)" fill="#ffc857"/>
      <rect x="65" y="118" width="40" height="16" rx="5" transform="rotate(310 85 126)" fill="#6bf2a4"/>
    </g>

    <g transform="translate(136 132)">
      <circle cx="100" cy="45" r="70" fill="#62dcff" fill-opacity="0.08"/>
      <circle cx="100" cy="45" r="45" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
      <circle cx="100" cy="45" r="68" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="100" y="42" fill="#f5f1e8" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="900" text-anchor="middle">53%</text>
      <text x="100" y="70" fill="#aaa79d" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" text-anchor="middle">FLOW PRESSURE</text>
    </g>
  </g>

  <g transform="translate(105 344)">
    <rect x="0" y="0" width="164" height="44" rx="10" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.13"/>
    <text x="20" y="28" fill="#6bf2a4" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">No install</text>
    <rect x="181" y="0" width="158" height="44" rx="10" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.13"/>
    <text x="201" y="28" fill="#62dcff" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Canvas UI</text>
    <rect x="356" y="0" width="188" height="44" rx="10" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.13"/>
    <text x="376" y="28" fill="#ffc857" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Live controls</text>
  </g>
</svg>
